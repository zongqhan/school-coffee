<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家後台 - 雲端商品管理系統</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f8f6f2; color: #3e3229; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .admin-panel { background: #ffffff; width: 100%; max-width: 800px; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(74, 55, 40, 0.06); }
        h2 { font-size: 24px; color: #4a3728; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #f1ebd9; padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        h3 { font-size: 18px; color: #634832; margin-top: 40px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dcd1c4; border-radius: 8px; font-size: 15px; background-color: #fdfdfb; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #a07855; background-color: #fff; }
        button { background: #a07855; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #845f40; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #f1ebd9; font-size: 15px; }
        th { background-color: #efebe4; color: #4a3728; font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        .pin-section { background: #fdfcf9; border: 1px dashed #dcd1c4; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; width: auto; margin-top: 0; font-size: 13px; }
        .delete-btn:hover { background-color: #c0392b; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="admin-panel">
        <h2>🛠️ 雲端餐點與庫存管理後台</h2>
        
        <div class="pin-section">
            <div>
                <span style="color: #634832; font-weight: 500;">🔑 當前結帳確認密碼：</span>
                <strong id="current-pin" style="font-size: 22px; color: #c0392b; letter-spacing: 2px;">----</strong>
                <p style="margin: 5px 0 0 0; font-size: 13px; color: #7f8c8d;">請於顧客結帳時輸入此密碼。建議定時更換。</p>
            </div>
            <button onclick="generateNewPin()" style="width: auto; margin: 0; padding: 8px 15px; background: #e67e22; font-size: 14px;">🔄 更換隨機密碼</button>
        </div>
        
        <input type="text" id="itemName" placeholder="請輸入餐點名稱（如：拿鐵咖啡）">
        <input type="number" id="itemPrice" placeholder="請輸入販售價格 (TWD $)">
        <input type="number" id="itemStock" placeholder="請輸入庫存數量">
        
        <select id="itemCategory">
            <option value="coffee">☕ 咖啡飲品</option>
            <option value="dessert">🍰 甜點與輕食</option>
        </select>
        
        <div style="margin-bottom: 20px; background: #fdfcf9; padding: 12px; border: 1px solid #efebe4; border-radius: 8px;">
            <span style="font-weight: bold; color: #4a3728; font-size: 14px;">🛠️ 開放客製化設定：</span>
            <label style="margin-right: 15px; font-size: 14px;"><input type="checkbox" id="itemIce" style="width:auto; margin-right:5px;">允許調整冰塊</label>
            <label style="font-size: 14px;"><input type="checkbox" id="itemSugar" style="width:auto; margin-right:5px;">允許調整甜度</label>
        </div>
        
        <button onclick="addNewItem()">✨ 儲存 / 更新商品資料至雲端</button>
        
        <h3 style="color: #e67e22; margin-top: 40px;">📝 最新顧客訂單</h3>
        <div id="orders-container" style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 40px;">
            <p style="color: #7f8c8d; font-size: 14px;">目前尚無新訂單</p>
        </div>
        <hr style="border: 0; border-top: 1px solid #f1ebd9; margin: 30px 0;">
        <h3>📦 雲端即時現有清單</h3>
        <table>
            <thead>
                <tr>
                    <th>品名</th>
                    <th>價格</th>
                    <th>類別</th>
                    <th>目前庫存</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="inventory-list">
            </tbody>
        </table>
    </div>

    <script src="admin.js"></script>
</body>
</html>
