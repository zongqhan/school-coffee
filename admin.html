<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家後台 - 雲端商品管理系統</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f8f6f2; color: #3e3229; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .admin-panel { background: #ffffff; width: 100%; max-width: 800px; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(74, 55, 40, 0.06); }
        h2 { font-size: 24px; color: #4a3728; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #f1ebd9; padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        h3 { font-size: 18px; color: #634832; margin-top: 40px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        input, select { display: block; width: 100%; box-sizing: border-box; margin: 14px 0; padding: 12px 16px; border: 1px solid #dcd1c4; border-radius: 8px; font-size: 15px; background-color: #fcfbfa; color: #3e3229; transition: all 0.25s ease; outline: none; }
        input:focus, select:focus { border-color: #a07855; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(160, 120, 85, 0.15); }
        button { width: 100%; background-color: #a07855; color: #ffffff; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background-color 0.2s, transform 0.1s; margin-top: 10px; }
        button:hover { background-color: #846244; }
        button:active { transform: scale(0.99); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; text-align: left; border-radius: 8px; overflow: hidden; border: 1px solid #eae1d4; }
        th { background-color: #4a3728; color: #ffffff; padding: 14px 18px; font-weight: 500; letter-spacing: 0.5px; }
        td { padding: 14px 18px; border-bottom: 1px solid #eae1d4; color: #5a4b41; background-color: #ffffff; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fdfcf9; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>🛠️ 雲端商品管理系統</h2>
        
        <div style="background: #fff3e0; border-left: 5px solid #ff9800; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-size: 15px; color: #d35400;">🔑 當前結帳確認密碼：</span>
                <strong id="current-pin" style="font-size: 22px; color: #c0392b; letter-spacing: 2px;">----</strong>
                <p style="margin: 5px 0 0 0; font-size: 13px; color: #7f8c8d;">請於顧客出示結帳畫面時輸入此密碼。為保證安全，建議定時更換。</p>
            </div>
            <button onclick="generateNewPin()" style="width: auto; margin: 0; padding: 8px 15px; background: #e67e22; font-size: 14px;">🔄 更換隨機密碼</button>
        </div>
        
        <input type="text" id="itemName" placeholder="請輸入餐點名稱（如：拿鐵咖啡）">
        <input type="number" id="itemPrice" placeholder="請輸入販售價格 (TWD)">
        <input type="number" id="itemStock" placeholder="請輸入初始庫存數量">
        
        <select id="itemCategory">
            <option value="coffee">☕ 咖啡飲品</option>
            <option value="dessert">🍰 甜點與輕食</option>
        </select>

        <div style="margin: 15px 0; background: #fdfcf9; padding: 12px; border: 1px solid #eae1d4; border-radius: 8px;">
            <span style="font-weight: bold; color: #4a3728;">🛠️ 開放客製化設定：</span>
            <label style="margin-right: 15px;"><input type="checkbox" id="itemIce" style="display:inline; width:auto; margin:0 5px;"> 允許調整冰塊</label>
            <label><input type="checkbox" id="itemSugar" style="display:inline; width:auto; margin:0 5px;"> 允許調整甜度</label>
        </div>
        
        <button onclick="addNewItem()">✨ 儲存 / 更新商品資料至雲端</button>
        
        <h3>📦 雲端即時現有清單</h3>
        <div id="order-board" style="display: flex; flex-direction: column; gap: 15px;"></div>
        
        <table>
            <thead>
                <tr>
                    <th>名稱</th>
                    <th>價格</th>
                    <th>類別</th>
                    <th>庫存</th>
                </tr>
            </thead>
            <tbody id="inventory-list">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="admin.js"></script>
</body>
</html>
